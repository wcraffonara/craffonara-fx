<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Caveat',cursive">
    <style>@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');</style>
    <defs>
        <!-- displacement filter: makes clean vector strokes look hand-drawn -->
        <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="5"/>
        </filter>
        <filter id="rough2" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="23" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
        </filter>
        <!-- graph paper grid -->
        <pattern id="grid5" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#DCE4E8" stroke-width="1"/>
        </pattern>
    </defs>

    <!-- paper -->
    <rect width="1200" height="680" fill="#FAF9F4"/>
    <rect width="1200" height="680" fill="url(#grid5)"/>

    <!-- handwritten title + rev note -->
    <text x="50" y="62" fill="#3F434C" font-size="42" font-weight="700">MIDI relay retrofit</text>
    <line x1="50" y1="74" x2="368" y2="70" stroke="#3F434C" stroke-width="3" stroke-linecap="round" filter="url(#rough2)"/>
    <text x="1030" y="50" fill="#2B4C9B" font-size="24">rev 0.9</text>
    <text x="1000" y="80" fill="#2B4C9B" font-size="22">CRAFFONARA FX</text>

    <!-- ================= stock pedal (pencil) ================= -->
    <g stroke="#3F434C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)">
        <rect x="90" y="140" width="180" height="290" rx="18"/>
        <circle cx="145" cy="195" r="22"/>
        <line x1="145" y1="195" x2="145" y2="177"/>
        <circle cx="215" cy="195" r="22"/>
        <line x1="215" y1="195" x2="215" y2="177"/>
        <circle cx="180" cy="255" r="6"/>
        <!-- 3PDT stomp switch -->
        <circle cx="180" cy="355" r="36"/>
        <circle cx="180" cy="355" r="22"/>
        <!-- solder lugs hint under the switch -->
        <line x1="150" y1="405" x2="150" y2="418"/>
        <line x1="180" y1="405" x2="180" y2="418"/>
        <line x1="210" y1="405" x2="210" y2="418"/>
    </g>
    <text x="120" y="470" fill="#3F434C" font-size="24">stock pedal</text>
    <text x="120" y="498" fill="#3F434C" font-size="20">3PDT latching, 9 lugs (!)</text>

    <!-- red X over the old switch + note -->
    <g stroke="#C0392B" stroke-width="4" stroke-linecap="round" filter="url(#rough2)">
        <line x1="148" y1="323" x2="212" y2="387"/>
        <line x1="212" y1="323" x2="148" y2="387"/>
    </g>
    <path d="M 226 372 C 270 400, 300 400, 330 380" fill="none" stroke="#C0392B" stroke-width="2.5" filter="url(#rough2)"/>
    <path d="M 330 380 l -14 -3 m 14 3 l -9 11" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="238" y="435" fill="#C0392B" font-size="24" transform="rotate(-3 238 435)">remove! clicky &amp; loud</text>

    <!-- swap arrow -->
    <path d="M 300 280 C 340 260, 370 260, 405 278" fill="none" stroke="#3F434C" stroke-width="3.5" stroke-linecap="round" filter="url(#rough2)"/>
    <path d="M 405 278 l -16 -4 m 16 4 l -11 12" fill="none" stroke="#3F434C" stroke-width="3.5" stroke-linecap="round"/>
    <text x="308" y="248" fill="#3F434C" font-size="24" transform="rotate(-4 308 248)">swap</text>

    <!-- ================= modded pedal (pencil + blue ink details) ================= -->
    <g stroke="#3F434C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)">
        <rect x="430" y="140" width="200" height="290" rx="18"/>
        <circle cx="490" cy="195" r="22"/>
        <line x1="490" y1="195" x2="490" y2="177"/>
        <circle cx="570" cy="195" r="22"/>
        <line x1="570" y1="195" x2="570" y2="177"/>
        <!-- TRS jack drilled into the top edge -->
        <rect x="566" y="118" width="26" height="22" rx="4"/>
        <circle cx="579" cy="129" r="5"/>
        <!-- soft-touch momentary switch (low profile) -->
        <circle cx="530" cy="380" r="30"/>
        <circle cx="530" cy="380" r="17"/>
    </g>

    <!-- relay PCB inside — blue ink, hatched -->
    <g stroke="#2B4C9B" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#rough2)">
        <rect x="465" y="255" width="130" height="60" rx="6"/>
        <!-- relay block with hatching -->
        <rect x="478" y="268" width="40" height="32"/>
        <line x1="482" y1="298" x2="512" y2="270"/>
        <line x1="490" y1="300" x2="518" y2="274"/>
        <line x1="500" y1="300" x2="518" y2="284"/>
        <!-- micro -->
        <rect x="536" y="272" width="24" height="24"/>
        <line x1="518" y1="286" x2="536" y2="286"/>
        <line x1="560" y1="286" x2="595" y2="286"/>
    </g>
    <text x="470" y="345" fill="#2B4C9B" font-size="22">relay PCB inside</text>

    <!-- callouts modded pedal -->
    <path d="M 592 128 C 660 105, 700 108, 735 122" fill="none" stroke="#2B4C9B" stroke-width="2.5" filter="url(#rough2)"/>
    <path d="M 592 128 l 15 -6 m -15 6 l 14 8" fill="none" stroke="#2B4C9B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="742" y="122" fill="#2B4C9B" font-size="24">MIDI IN — TRS type A</text>
    <text x="742" y="148" fill="#2B4C9B" font-size="20">drill Ø 12 mm, top side</text>

    <path d="M 566 382 C 640 395, 680 392, 718 378" fill="none" stroke="#2B4C9B" stroke-width="2.5" filter="url(#rough2)"/>
    <path d="M 566 382 l 15 -7 m -15 7 l 15 7" fill="none" stroke="#2B4C9B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="726" y="378" fill="#2B4C9B" font-size="24">soft-touch momentary</text>
    <text x="726" y="404" fill="#2B4C9B" font-size="20">silent, relay does the switching</text>

    <text x="452" y="470" fill="#3F434C" font-size="24">after the mod</text>
    <text x="452" y="498" fill="#3F434C" font-size="20">circuit untouched → tone stays</text>

    <!-- ================= MIDI switcher (pencil) ================= -->
    <g stroke="#3F434C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)">
        <rect x="800" y="480" width="340" height="130" rx="14"/>
        <rect x="822" y="500" width="88" height="32" rx="4"/>
        <circle cx="845"  cy="575" r="15"/><circle cx="915" cy="575" r="15"/>
        <circle cx="985" cy="575" r="15"/><circle cx="1055" cy="575" r="15"/><circle cx="1115" cy="575" r="15"/>
        <!-- MIDI OUT jack -->
        <rect x="1000" y="458" width="26" height="20" rx="4"/>
    </g>
    <text x="838" y="524" fill="#3F434C" font-size="22">PC 42</text>
    <text x="852" y="648" fill="#3F434C" font-size="24">MIDI switcher, e.g. BOSS ES-8</text>
    <text x="1038" y="472" fill="#3F434C" font-size="20">MIDI OUT</text>

    <!-- ================= TRS cable, wavy hand-drawn ================= -->
    <path d="M 579 112 C 585 40, 760 30, 860 90 C 960 150, 1010 300, 1013 452"
          fill="none" stroke="#C0392B" stroke-width="3.5" stroke-linecap="round" filter="url(#rough)"/>
    <text x="770" y="70" fill="#C0392B" font-size="26" transform="rotate(3 770 70)">TRS MIDI cable</text>
    <text x="880" y="200" fill="#C0392B" font-size="22" transform="rotate(14 880 200)">PC / CC → relay</text>

    <!-- footer note -->
    <text x="50" y="640" fill="#3F434C" font-size="22">→ one board recalls every pedal state. no tap dancing.</text>
    <circle cx="1130" cy="640" r="4" fill="#3F434C"/>
</svg>
