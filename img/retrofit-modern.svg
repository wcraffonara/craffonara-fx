<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'IBM Plex Mono',monospace">
    <style>@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');</style>
    <defs>
        <linearGradient id="enc1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#23262D"/><stop offset="1" stop-color="#16181D"/>
        </linearGradient>
        <linearGradient id="enc2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2E4E8F"/><stop offset="1" stop-color="#22376A"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#FFAD2E"/>
        </marker>
        <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#9DA0A8"/>
        </marker>
    </defs>

    <rect width="1200" height="680" fill="#0C0D10"/>

    <!-- title -->
    <circle cx="46" cy="47" r="5" fill="#FFAD2E"/>
    <text x="62" y="52" fill="#9DA0A8" font-size="14" letter-spacing="4">MIDI RELAY RETROFIT — HOW IT WORKS</text>

    <!-- ======================= STAGE 01 — stock pedal ======================= -->
    <text x="120" y="120" fill="#FFAD2E" font-size="13" letter-spacing="3">01 · STOCK PEDAL</text>

    <g transform="translate(80,140)">
        <rect x="0" y="0" width="180" height="290" rx="18" fill="url(#enc1)" stroke="#33373F" stroke-width="2"/>
        <!-- knobs -->
        <circle cx="55" cy="55" r="22" fill="#1A1C21" stroke="#0C0D10" stroke-width="2"/>
        <line x1="55" y1="55" x2="55" y2="37" stroke="#EDEAE2" stroke-width="3" stroke-linecap="round"/>
        <circle cx="125" cy="55" r="22" fill="#1A1C21" stroke="#0C0D10" stroke-width="2"/>
        <line x1="125" y1="55" x2="125" y2="37" stroke="#EDEAE2" stroke-width="3" stroke-linecap="round"/>
        <circle cx="90" cy="120" r="6" fill="#4A3413"/>
        <!-- mechanical 3PDT stomp switch -->
        <g id="stomp3pdt">
            <circle cx="90" cy="215" r="36" fill="#101216" stroke="#33373F" stroke-width="2"/>
            <circle cx="90" cy="215" r="24" fill="#6E747E"/>
            <circle cx="90" cy="215" r="10" fill="#22252B"/>
        </g>
    </g>

    <!-- callout: the part that gets removed -->
    <circle cx="170" cy="355" r="46" fill="none" stroke="#E23B2E" stroke-width="2.5" stroke-dasharray="6 5"/>
    <line x1="216" y1="355" x2="286" y2="330" stroke="#E23B2E" stroke-width="2" marker-end="url(#arrowDim)"/>
    <text x="86" y="480" fill="#E23B2E" font-size="13" letter-spacing="1">3PDT MECHANICAL</text>
    <text x="86" y="500" fill="#E23B2E" font-size="13" letter-spacing="1">STOMP SWITCH — OUT</text>

    <!-- retrofit arrow -->
    <line x1="290" y1="285" x2="380" y2="285" stroke="#FFAD2E" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="335" y="268" fill="#FFAD2E" font-size="12" letter-spacing="3" text-anchor="middle">RETROFIT</text>

    <!-- ======================= STAGE 02 — modded pedal ====================== -->
    <text x="440" y="120" fill="#FFAD2E" font-size="13" letter-spacing="3">02 · MIDI RELAY MOD</text>

    <g transform="translate(410,140)">
        <!-- TRS MIDI jack on the top edge -->
        <rect x="138" y="-16" width="24" height="20" rx="4" fill="#3C4048"/>
        <circle cx="150" cy="-6" r="6" fill="#101216"/>

        <rect x="0" y="0" width="200" height="290" rx="18" fill="url(#enc2)" stroke="#33373F" stroke-width="2"/>
        <!-- knobs -->
        <circle cx="60" cy="55" r="22" fill="#1A1C21" stroke="#0C0D10" stroke-width="2"/>
        <line x1="60" y1="55" x2="60" y2="37" stroke="#EDEAE2" stroke-width="3" stroke-linecap="round"/>
        <circle cx="140" cy="55" r="22" fill="#1A1C21" stroke="#0C0D10" stroke-width="2"/>
        <line x1="140" y1="55" x2="140" y2="37" stroke="#EDEAE2" stroke-width="3" stroke-linecap="round"/>
        <circle cx="100" cy="106" r="6" fill="#FFAD2E"/>

        <!-- cutaway window revealing the relay PCB inside -->
        <g>
            <rect x="34" y="130" width="132" height="66" rx="8" fill="#0E1013" stroke="#33373F" stroke-width="1.5"/>
            <!-- PCB -->
            <rect x="46" y="141" width="108" height="44" rx="4" fill="#173D2A" stroke="#0B241A" stroke-width="1.5"/>
            <!-- relay block -->
            <rect x="56" y="150" width="34" height="26" rx="3" fill="#22252B" stroke="#000" stroke-width="1"/>
            <text x="73" y="167" fill="#9DA0A8" font-size="9" text-anchor="middle">RELAY</text>
            <!-- microcontroller -->
            <rect x="102" y="153" width="20" height="20" rx="2" fill="#22252B"/>
            <!-- traces -->
            <line x1="90" y1="163" x2="102" y2="163" stroke="#FFAD2E" stroke-width="1.5"/>
            <line x1="122" y1="163" x2="146" y2="163" stroke="#FFAD2E" stroke-width="1.5"/>
        </g>

        <!-- soft-touch momentary switch: low profile -->
        <g>
            <circle cx="100" cy="240" r="30" fill="#101216" stroke="#33373F" stroke-width="2"/>
            <circle cx="100" cy="240" r="19" fill="#3C4048"/>
            <circle cx="100" cy="240" r="19" fill="none" stroke="#FFAD2E" stroke-width="2"/>
        </g>
    </g>

    <!-- callouts stage 02 -->
    <line x1="620" y1="300" x2="680" y2="300" stroke="#9DA0A8" stroke-width="1.5" marker-start="url(#arrowDim)"/>
    <text x="690" y="292" fill="#EDEAE2" font-size="12.5">RELAY BYPASS PCB</text>
    <text x="690" y="310" fill="#9DA0A8" font-size="11.5">audio switched by relay,</text>
    <text x="690" y="326" fill="#9DA0A8" font-size="11.5">MIDI + switch as trigger</text>

    <line x1="545" y1="380" x2="680" y2="380" stroke="#9DA0A8" stroke-width="1.5" marker-start="url(#arrowDim)"/>
    <text x="690" y="376" fill="#EDEAE2" font-size="12.5">SOFT-TOUCH MOMENTARY SWITCH</text>
    <text x="690" y="394" fill="#9DA0A8" font-size="11.5">silent, no mechanical pop</text>

    <line x1="565" y1="128" x2="620" y2="100" stroke="#9DA0A8" stroke-width="1.5" marker-start="url(#arrowDim)"/>
    <text x="630" y="96" fill="#EDEAE2" font-size="12.5">MIDI IN — TRS TYPE-A</text>

    <!-- ======================= STAGE 03 — MIDI switcher ===================== -->
    <text x="850" y="440" fill="#FFAD2E" font-size="13" letter-spacing="3">03 · MIDI CONTROL</text>

    <g transform="translate(820,460)">
        <rect x="0" y="0" width="340" height="130" rx="14" fill="url(#enc1)" stroke="#33373F" stroke-width="2"/>
        <!-- display -->
        <rect x="20" y="18" width="90" height="34" rx="4" fill="#0E1013" stroke="#33373F"/>
        <text x="65" y="40" fill="#FFAD2E" font-size="13" text-anchor="middle" letter-spacing="2">PC 042</text>
        <!-- footswitch row -->
        <g fill="#6E747E">
            <circle cx="45"  cy="95" r="15"/><circle cx="115" cy="95" r="15"/>
            <circle cx="185" cy="95" r="15"/><circle cx="255" cy="95" r="15"/><circle cx="315" cy="95" r="15"/>
        </g>
        <g fill="#101216">
            <circle cx="45"  cy="95" r="7"/><circle cx="115" cy="95" r="7"/>
            <circle cx="185" cy="95" r="7"/><circle cx="255" cy="95" r="7"/><circle cx="315" cy="95" r="7"/>
        </g>
        <!-- MIDI OUT jack on top edge -->
        <rect x="200" y="-16" width="24" height="18" rx="4" fill="#3C4048"/>
        <circle cx="212" cy="-8" r="5" fill="#101216"/>
        <text x="240" y="-6" fill="#9DA0A8" font-size="10" letter-spacing="1">MIDI OUT</text>
        <text x="170" y="152" fill="#9DA0A8" font-size="11.5" text-anchor="middle" letter-spacing="2">MIDI SWITCHER · e.g. BOSS ES-8</text>
    </g>

    <!-- ======================= TRS cable: pedal -> switcher ================= -->
    <path d="M 560 124 C 560 60, 1032 100, 1032 444"
          fill="none" stroke="#FFAD2E" stroke-width="4" stroke-linecap="round"/>
    <path d="M 560 124 C 560 60, 1032 100, 1032 444"
          fill="none" stroke="#0C0D10" stroke-width="1.2" stroke-dasharray="2 10" stroke-linecap="round"/>
    <!-- TRS plugs -->
    <rect x="552" y="120" width="16" height="22" rx="4" fill="#B7BCC5"/>
    <rect x="1024" y="428" width="16" height="22" rx="4" fill="#B7BCC5"/>
    <text x="800" y="70" fill="#FFAD2E" font-size="12.5" text-anchor="middle" letter-spacing="2">TRS MIDI CABLE · PC / CC MESSAGES</text>

    <!-- ======================= bottom message flow ========================== -->
    <line x1="60" y1="590" x2="60" y2="640" stroke="#2A2E36" stroke-width="1"/>
    <text x="80" y="606" fill="#9DA0A8" font-size="12">SIGNAL FLOW:</text>
    <text x="80" y="632" fill="#EDEAE2" font-size="13" letter-spacing="1">
        CC#80 val 127
        <tspan fill="#FFAD2E">  →  </tspan>relay ON
        <tspan fill="#FFAD2E">  →  </tspan>effect engaged
        <tspan fill="#FFAD2E">  →  </tspan>LED lit — recall any pedal state from one board
    </text>
</svg>
