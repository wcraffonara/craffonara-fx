<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" font-family="'Big Shoulders Display','Arial Narrow',Arial,sans-serif">
    <style>@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap');</style>
    <rect width="760" height="220" rx="14" fill="#0C0D10"/>

    <!-- signal chain: the wordmark IS the pedal in the chain -->
    <g font-family="'IBM Plex Mono',monospace" font-size="14" fill="#9DA0A8" letter-spacing="3">
        <text x="30" y="105">IN</text>
        <text x="682" y="105">OUT</text>
    </g>
    <line x1="66" y1="100" x2="128" y2="100" stroke="#9DA0A8" stroke-width="4" stroke-linecap="round"/>
    <line x1="632" y1="100" x2="672" y2="100" stroke="#9DA0A8" stroke-width="4" stroke-linecap="round"/>

    <!-- the block -->
    <rect x="136" y="52" width="488" height="96" rx="16" fill="none" stroke="#EDEAE2" stroke-width="5"/>
    <!-- status LED in the corner of the block -->
    <circle cx="164" cy="78" r="7" fill="#FFAD2E"/>

    <text x="380" y="122" text-anchor="middle" fill="#EDEAE2" font-weight="800"
          font-size="52" letter-spacing="4">CRAFFONARA <tspan fill="#FFAD2E">FX</tspan></text>

    <!-- MIDI feed entering the block from below: TRS plug + line -->
    <line x1="380" y1="196" x2="380" y2="148" stroke="#FFAD2E" stroke-width="4" stroke-linecap="round"/>
    <rect x="372" y="192" width="16" height="12" rx="3" fill="#FFAD2E"/>
    <text x="398" y="200" fill="#FFAD2E" font-family="'IBM Plex Mono',monospace"
          font-size="13" letter-spacing="4">MIDI</text>
</svg>
