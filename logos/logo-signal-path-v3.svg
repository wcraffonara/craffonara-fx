<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" font-family="'Big Shoulders Display','Arial Narrow',Arial,sans-serif">
    <style>@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap');</style>
    <rect width="640" height="200" rx="14" fill="#0C0D10"/>

    <!-- minimal chain: line passes THROUGH the FX mark, no labels needed -->
    <line x1="60" y1="74" x2="266" y2="74" stroke="#3C4048" stroke-width="5" stroke-linecap="round"/>
    <line x1="374" y1="74" x2="580" y2="74" stroke="#3C4048" stroke-width="5" stroke-linecap="round"/>

    <!-- FX mark: amber block, slightly rotated for energy -->
    <g transform="rotate(-4 320 74)">
        <rect x="274" y="38" width="92" height="72" rx="14" fill="#FFAD2E"/>
        <text x="320" y="92" text-anchor="middle" fill="#14100A" font-weight="800"
              font-size="46" letter-spacing="2">FX</text>
    </g>
    <!-- MIDI stub from below into the block -->
    <line x1="320" y1="140" x2="320" y2="116" stroke="#FFAD2E" stroke-width="4" stroke-linecap="round"/>
    <circle cx="320" cy="142" r="5" fill="#FFAD2E"/>

    <!-- wordmark -->
    <text x="320" y="182" text-anchor="middle" fill="#EDEAE2" font-weight="800"
          font-size="40" letter-spacing="10">CRAFFONARA</text>
</svg>
