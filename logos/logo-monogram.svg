<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" font-family="'Big Shoulders Display','Arial Narrow',Arial,sans-serif">
    <style>@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&amp;display=swap');</style>
    <rect width="300" height="340" rx="16" fill="#0C0D10"/>

    <!-- pedal enclosure silhouette -->
    <rect x="70" y="34" width="160" height="272" rx="22"
          fill="none" stroke="#EDEAE2" stroke-width="8"/>

    <!-- LED -->
    <circle cx="150" cy="74" r="9" fill="#FFAD2E"/>

    <!-- CFX monogram as the "silkscreen" -->
    <text x="150" y="185" text-anchor="middle" fill="#EDEAE2"
          font-weight="800" font-size="92" letter-spacing="4">CFX</text>

    <!-- footswitch -->
    <circle cx="150" cy="252" r="30" fill="none" stroke="#EDEAE2" stroke-width="8"/>
    <circle cx="150" cy="252" r="12" fill="#FFAD2E"/>
</svg>
